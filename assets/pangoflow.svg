        <circle cx="22" cy="18" r="7" fill="#22d3ee"/>
        <text x="42" y="23" font-family="Arial, sans-serif" font-size="13" fill="#f2fbff">Deep Work</text>
      </g>

      <g transform="translate(0 72)" font-family="Arial, sans-serif" font-size="12" fill="#849aa4">
        <text x="42" y="0">Jun</text><text x="112" y="0">Jul</text><text x="184" y="0">Aug</text><text x="256" y="0">Sep</text><text x="328" y="0">Oct</text><text x="400" y="0">Nov</text><text x="472" y="0">Dec</text><text x="544" y="0">Jan</text>
        <text x="0" y="36">Mon</text><text x="0" y="76">Wed</text><text x="0" y="116">Fri</text>
      </g>

