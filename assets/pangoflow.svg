<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760">
  <rect width="1180" height="760" fill="#0b1215"/>

  <text x="56" y="62" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#f2fbff">Extension-first structure</text>
  <text x="56" y="92" font-family="Arial, sans-serif" font-size="15" fill="#9fb3bc">Popup for quick capture. Dashboard page for the full self-improvement blocks experience.</text>

  <g transform="translate(56 132)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#f2fbff">Extension Popup</text>
    <text x="0" y="26" font-family="Arial, sans-serif" font-size="14" fill="#849aa4">Small, fast, action-oriented</text>

    <rect x="0" y="54" width="340" height="500" rx="22" fill="#111b21" stroke="#22323a"/>
    <g transform="translate(22 82)">
      <text x="0" y="0" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#f2fbff">Blocks</text>
      <text x="0" y="28" font-family="Arial, sans-serif" font-size="14" fill="#9fb3bc">Today: 6 blocks built</text>

      <rect x="230" y="-20" width="66" height="34" rx="17" fill="#164e63"/>
      <text x="247" y="2" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#a5f3fc">Open</text>

      <rect x="0" y="58" width="296" height="118" rx="16" fill="#17232a"/>
      <text x="18" y="86" font-family="Arial, sans-serif" font-size="15" fill="#9fb3bc">Focus Session</text>
      <text x="18" y="128" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#f2fbff">25:00</text>
      <rect x="202" y="92" width="76" height="42" rx="21" fill="#22d3ee"/>
      <text x="224" y="119" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#06252c">Start</text>

      <text x="0" y="215" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#f2fbff">Quick Add</text>
      <g transform="translate(0 234)">
        <rect x="0" y="0" width="296" height="52" rx="14" fill="#17232a"/>
        <rect x="14" y="14" width="24" height="24" rx="6" fill="#22d3ee"/>
        <text x="52" y="22" font-family="Arial, sans-serif" font-size="15" fill="#f2fbff">Deep Work</text>
        <text x="52" y="40" font-family="Arial, sans-serif" font-size="12" fill="#849aa4">+1 block</text>
        <text x="260" y="33" font-family="Arial, sans-serif" font-size="25" fill="#a5f3fc">+</text>

        <rect x="0" y="64" width="296" height="52" rx="14" fill="#17232a"/>
        <rect x="14" y="78" width="24" height="24" rx="6" fill="#0e7490"/>
        <text x="52" y="86" font-family="Arial, sans-serif" font-size="15" fill="#f2fbff">Reading</text>
        <text x="52" y="104" font-family="Arial, sans-serif" font-size="12" fill="#849aa4">10 pages = 1 block</text>
        <text x="260" y="97" font-family="Arial, sans-serif" font-size="25" fill="#a5f3fc">+</text>

        <rect x="0" y="128" width="296" height="52" rx="14" fill="#17232a"/>
        <rect x="14" y="142" width="24" height="24" rx="6" fill="#164e63"/>
        <text x="52" y="150" font-family="Arial, sans-serif" font-size="15" fill="#f2fbff">Workout</text>
        <text x="52" y="168" font-family="Arial, sans-serif" font-size="12" fill="#849aa4">1 session = 2 blocks</text>
        <text x="260" y="161" font-family="Arial, sans-serif" font-size="25" fill="#a5f3fc">+</text>
      </g>

      <rect x="0" y="438" width="296" height="40" rx="14" fill="#0e7490"/>
      <text x="93" y="463" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#e6fbff">View Dashboard</text>
    </g>
  </g>

  <g transform="translate(454 132)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#f2fbff">Extension Dashboard Page</text>
    <text x="0" y="26" font-family="Arial, sans-serif" font-size="14" fill="#849aa4">Full-screen page opened from the extension</text>

    <rect x="0" y="54" width="670" height="500" rx="22" fill="#111b21" stroke="#22323a"/>

