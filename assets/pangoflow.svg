          <g id="w1"><rect x="0" y="0" width="10" height="10" rx="2.5" fill="#1b2730"/><rect x="0" y="14" width="10" height="10" rx="2.5" fill="#164e63"/><rect x="0" y="28" width="10" height="10" rx="2.5" fill="#0e7490"/><rect x="0" y="42" width="10" height="10" rx="2.5" fill="#22d3ee"/><rect x="0" y="56" width="10" height="10" rx="2.5" fill="#a5f3fc"/><rect x="0" y="70" width="10" height="10" rx="2.5" fill="#1b2730"/><rect x="0" y="84" width="10" height="10" rx="2.5" fill="#0e7490"/></g>
          <g id="w2"><rect x="0" y="0" width="10" height="10" rx="2.5" fill="#164e63"/><rect x="0" y="14" width="10" height="10" rx="2.5" fill="#0e7490"/><rect x="0" y="28" width="10" height="10" rx="2.5" fill="#22d3ee"/><rect x="0" y="42" width="10" height="10" rx="2.5" fill="#22d3ee"/><rect x="0" y="56" width="10" height="10" rx="2.5" fill="#1b2730"/><rect x="0" y="70" width="10" height="10" rx="2.5" fill="#164e63"/><rect x="0" y="84" width="10" height="10" rx="2.5" fill="#a5f3fc"/></g>
          <g id="w3"><rect x="0" y="0" width="10" height="10" rx="2.5" fill="#0e7490"/><rect x="0" y="14" width="10" height="10" rx="2.5" fill="#22d3ee"/><rect x="0" y="28" width="10" height="10" rx="2.5" fill="#1b2730"/><rect x="0" y="42" width="10" height="10" rx="2.5" fill="#0e7490"/><rect x="0" y="56" width="10" height="10" rx="2.5" fill="#22d3ee"/><rect x="0" y="70" width="10" height="10" rx="2.5" fill="#a5f3fc"/><rect x="0" y="84" width="10" height="10" rx="2.5" fill="#164e63"/></g>
        </defs>
        <use href="#w1" x="0"/><use href="#w2" x="14"/><use href="#w3" x="28"/><use href="#w1" x="42"/><use href="#w2" x="56"/><use href="#w3" x="70"/>
        <use href="#w2" x="98"/><use href="#w3" x="112"/><use href="#w1" x="126"/><use href="#w2" x="140"/>
        <use href="#w3" x="168"/><use href="#w1" x="182"/><use href="#w2" x="196"/><use href="#w3" x="210"/>
        <use href="#w1" x="238"/><use href="#w2" x="252"/><use href="#w3" x="266"/><use href="#w1" x="280"/>
        <use href="#w2" x="308"/><use href="#w3" x="322"/><use href="#w1" x="336"/><use href="#w2" x="350"/>
        <use href="#w3" x="378"/><use href="#w1" x="392"/><use href="#w2" x="406"/><use href="#w3" x="420"/>
        <use href="#w1" x="448"/><use href="#w2" x="462"/><use href="#w3" x="476"/><use href="#w1" x="490"/>
        <use href="#w2" x="518"/><use href="#w3" x="532"/><use href="#w1" x="546"/>
      </g>

      <g transform="translate(0 226)">
        <rect x="0" y="0" width="188" height="92" rx="16" fill="#17232a"/>
        <text x="18" y="30" font-family="Arial, sans-serif" font-size="13" fill="#9fb3bc">Today</text>
        <text x="18" y="62" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#f2fbff">6 blocks</text>

        <rect x="212" y="0" width="188" height="92" rx="16" fill="#17232a"/>
        <text x="230" y="30" font-family="Arial, sans-serif" font-size="13" fill="#9fb3bc">Current streak</text>
        <text x="230" y="62" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#f2fbff">12 days</text>

        <rect x="424" y="0" width="188" height="92" rx="16" fill="#17232a"/>
        <text x="442" y="30" font-family="Arial, sans-serif" font-size="13" fill="#9fb3bc">Target</text>
        <text x="442" y="62" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#f2fbff">4/day</text>
      </g>

      <g transform="translate(0 350)" font-family="Arial, sans-serif" font-size="13" fill="#9fb3bc">
        <text x="0" y="0">Popup starts sessions and captures blocks. Dashboard explains the year.</text>
